<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oLinker Gateway Configuration</title>
    <!-- Modern Bootstrap for ease of styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <h1>oLinker Web UI</h1>
            </div>
            <div class="status-badge" id="system-status">
                <span class="pulse"></span> Online
            </div>
        </header>

        <main class="content grid-layout">
            <section class="config-panel glass-panel">
                <h2>Server Configuration</h2>
                <form id="config-form">
                    <div class="mb-3">
                        <label class="form-label">Active Vendor SDK</label>
                        <select class="form-select custom-select" id="vendor-select">
                            <option value="orbita">Orbita (CLock)</option>
                            <option value="betech">BeTech (btlock57L)</option>
                            <option value="adel">Adel (MainDll)</option>
                            <option value="hune">Hune (HUNERF)</option>
                            <option value="prousb">ProUSB (proRFL)</option>
                            <option value="dlock">DLock (LockSDK)</option>
                            <option value="mock">Mock Vendor (Testing)</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">DLL Path</label>
                        <input type="text" class="form-control custom-input" id="dll-path" value="./assets/dll/orbital/CLock.dll">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">API Port (Requires Restart)</label>
                        <input type="number" class="form-control custom-input" id="api-port" value="9000">
                    </div>

                    <div id="vendor-settings" class="mb-3">
                        <!-- Dynamic vendor settings will be injected here -->
                    </div>

                    <div class="btn-group w-100">
                        <button type="button" class="btn btn-primary primary-btn" id="save-btn">Save Config</button>
                        <button type="button" class="btn btn-danger stop-btn" id="restart-btn" onclick="alert('Restart the oLinker manually for changes to take effect!')">Restart</button>
                    </div>
                </form>
            </section>

            <section class="test-panel glass-panel">
                <h2>API Test Tool</h2>
                <div class="tabs">
                    <button class="tab active" data-target="encode">Encode</button>
                    <button class="tab" data-target="status-test">Read Card</button>
                </div>
                
                <div id="encode" class="tab-content active">
                    <div class="mb-2">
                        <input type="text" class="form-control custom-input" id="test-room" placeholder="Room Number (e.g. 101)">
                    </div>
                    <button class="btn btn-success action-btn w-100 mb-3" id="test-encode-btn">Encode Test Card</button>
                </div>
                
                <div id="status-test" class="tab-content">
                    <button class="btn btn-secondary action-btn w-100 mb-3" id="test-read-btn">Read Active Card</button>
                </div>

                <div class="console-output" id="console">
                    <div class="log-entry system">Gateway UI initialized and ready. Use the PMS to connect to localhost:9000</div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
